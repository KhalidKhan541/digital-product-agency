name: Auto Find Creators

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      niche:
        description: "Niche to search (fitness, finance, tech, marketing, lifestyle)"
        required: false
        type: string

jobs:
  find-creators:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Twitter creator finder
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/twitter_finder.py

      - name: Commit updated pipeline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pipeline.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-find: added new creators to pipeline [skip ci]"
            git push
          fi
