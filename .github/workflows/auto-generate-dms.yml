name: Auto Generate DMs

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  generate-dms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate DMs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install requests
          python scripts/generate_dms.py
